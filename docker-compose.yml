version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: geomhls

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/geomhls
      JWT_SECRET: dev-jwt-secret-change-in-production-1234567890
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-0987654321
      CLIENT_URL: http://localhost:5173
      PORT: '5000'
      NODE_ENV: development
    volumes:
      - ./server/src:/app/server/src
      - ./shared/src:/app/shared/src

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - server
    environment:
      VITE_API_URL: http://server:5000
      VITE_SOCKET_URL: http://server:5000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    volumes:
      - ./client/src:/app/client/src
      - ./shared/src:/app/shared/src

volumes:
  mongo_data:
