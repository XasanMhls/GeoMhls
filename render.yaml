services:
  # ── Backend ──────────────────────────────────────────────
  - type: web
    name: geomhls-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w server
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://geomhls-client.onrender.com
      - key: VAPID_SUBJECT
        value: mailto:admin@geomhls.app
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────
  - type: web
    name: geomhls-client
    runtime: static
    plan: free
    buildCommand: npm install && npm run build -w client
    staticPublishPath: client/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://geomhls-server.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://geomhls-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
